name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --onefile --clean --name tsl_batch_generator main.py

      - name: Copy runtime files
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist\tsl_batch_generator.exe release\
          if (Test-Path TSL_password_generator.exe) { Copy-Item TSL_password_generator.exe release\ }
          if (Test-Path A.xlsx) { Copy-Item A.xlsx release\ }
          if (Test-Path README.md) { Copy-Item README.md release\ }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tsl-batch-generator-windows
          path: release/
